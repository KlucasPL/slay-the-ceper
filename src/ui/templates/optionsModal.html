<div id="options-modal" class="modal hidden" aria-hidden="true">
  <div class="modal-content options-content">
    <span id="options-close-btn" class="close-btn" role="button" tabindex="0" aria-label="Zamknij"
      >&times;</span
    >
    <h2 id="options-title">Opcje</h2>
    <div class="options-row">
      <span id="option-menu-music-label">Muzyka w Menu</span>
      <button id="option-menu-music-btn" class="option-toggle" type="button" aria-pressed="true">
        ON
      </button>
    </div>
    <div class="options-row">
      <span id="option-game-music-label">Muzyka w Grze</span>
      <button id="option-game-music-btn" class="option-toggle" type="button" aria-pressed="true">
        ON
      </button>
    </div>
    <div class="options-row">
      <span id="option-skip-intro-label">Pomiń Wstęp</span>
      <button id="option-skip-intro-btn" class="option-toggle" type="button" aria-pressed="false">
        OFF
      </button>
    </div>
    <div class="options-row">
      <span id="option-text-size-label">Rozmiar Tekstu</span>
      <button
        id="option-text-size-btn"
        class="option-toggle"
        type="button"
        aria-label="Rozmiar tekstu"
      >
        NORMALNY
      </button>
    </div>
    <div class="options-row">
      <span id="option-language-label">Język</span>
      <button id="option-language-btn" class="option-toggle" type="button" aria-label="Język">
        Polski
      </button>
    </div>
    <div class="options-row">
      <span id="option-analytics-label">Analityka gry</span>
      <button id="option-analytics-btn" class="option-toggle" type="button" aria-pressed="true">
        ON
      </button>
    </div>
    <div class="options-action-row">
      <button id="option-back-main-btn" class="option-back-main-btn" type="button">
        Wróć do menu głównego
      </button>
    </div>
  </div>
</div>

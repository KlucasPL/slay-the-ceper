name: Baseline Update

on:
  pull_request:
    types: [labeled]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  baseline-update:
    if: github.event.label.name == 'baseline-update'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run baseline simulation (10k games)
        run: npm run sim -- --games 10000 --out metrics/baseline-update.jsonl --verbosity summary

      - name: Analyze simulation output
        run: node scripts/analyze.js metrics/baseline-update.jsonl baselines/main.metrics.json

      - name: Commit updated baseline
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baselines/main.metrics.json
          git diff --staged --quiet && echo "No changes to baseline." && exit 0
          git commit -m "chore(baselines): regenerate main.metrics.json at 10k games"
          git push

      - name: Post completion comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "Baseline regenerated at 10k games and committed to this branch."

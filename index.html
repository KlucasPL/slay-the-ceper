<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usiec Cepra (ang. Slay the Ceper)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c1e16;
            color: #f4e8d2;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        h1 { margin-top: 0; color: #e6b800; text-shadow: 2px 2px #000; letter-spacing: 1px;}
        
        .battlefield {
            display: flex;
            justify-content: space-around;
            width: 800px;
            background: #4a3320;
            padding: 30px;
            border-radius: 15px;
            border: 4px solid #8b5a2b;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        
        .entity {
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            width: 35%;
        }
        .entity h2 { margin-top: 0; }
        
        /* SPRITE'Y I ANIMACJE */
        .sprite {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 140px;
            margin: 10px auto;
            transition: 0.1s;
        }

        /* Atak Gracza (doskok w prawo) */
        @keyframes anim-attack-p {
            0% { transform: translateX(0); }
            50% { transform: translateX(60px) scale(1.1); }
            100% { transform: translateX(0); }
        }
        .anim-attack-p { animation: anim-attack-p 0.3s ease-out; }

        /* Atak Wroga (doskok w lewo) */
        @keyframes anim-attack-e {
            0% { transform: translateX(0); }
            50% { transform: translateX(-60px) scale(1.1); }
            100% { transform: translateX(0); }
        }
        .anim-attack-e { animation: anim-attack-e 0.3s ease-out; }

        /* Obrażenia (trzęsienie z czerwonym cieniem) */
        @keyframes anim-damage {
            0% { transform: translateX(0); filter: drop-shadow(0 0 0 red); }
            25% { transform: translateX(-15px); filter: drop-shadow(0 0 15px red); }
            50% { transform: translateX(15px); filter: drop-shadow(0 0 15px red); }
            75% { transform: translateX(-15px); filter: drop-shadow(0 0 15px red); }
            100% { transform: translateX(0); filter: drop-shadow(0 0 0 red); }
        }
        .anim-damage { animation: anim-damage 0.4s ease-in-out; }

        /* Garda (niebieski puls) */
        @keyframes anim-block {
            0% { filter: drop-shadow(0 0 0px #4da6ff); }
            50% { filter: drop-shadow(0 0 25px #4da6ff); transform: scale(1.05); }
            100% { filter: drop-shadow(0 0 0px #4da6ff); }
        }
        .anim-block { animation: anim-block 0.4s ease-out; }

        .stats { font-size: 1.2em; margin: 5px 0; font-weight: bold; }
        .intent { color: #ff6b6b; font-weight: bold; height: 25px; margin-bottom: 10px; }
        
        .ui-bar {
            width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .energy { 
            font-size: 1.5em; background: #8b5a2b; padding: 10px 20px; 
            border-radius: 20px; font-weight: bold; display: flex; align-items: center; gap: 10px;
        }
        .icon-oscypek { width: 30px; height: 30px; }
        
        .btn {
            background-color: #e6b800; color: #2c1e16;
            border: none; padding: 15px 30px; font-size: 1.2em;
            font-weight: bold; border-radius: 10px; cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { background-color: #ffd700; transform: scale(1.05); }
        .btn:disabled { background-color: #777; cursor: not-allowed; transform: none; }
        
        .hand {
            display: flex; gap: 15px; height: 250px;
            width: 1000px; justify-content: center;
        }
        
        .card {
            background: #f4e8d2; color: #2c1e16;
            width: 160px; height: 230px; border-radius: 10px;
            border: 3px solid #555; padding: 10px;
            display: flex; flex-direction: column;
            cursor: pointer; position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: 0.2s ease-out;
            user-select: none;
        }
        .card:hover { transform: translateY(-20px); border-color: #e6b800; }
        .card.disabled { opacity: 0.5; cursor: not-allowed; }
        .card.disabled:hover { transform: none; border-color: #555; }
        
        .card-cost {
            position: absolute; top: -20px; left: -20px;
            width: 55px; height: 55px; display: flex;
            justify-content: center; align-items: center;
            font-weight: bold; font-size: 1.5em;
            color: #fff;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'><polygon points='50,5 90,50 50,95 10,50' fill='%23fbb03b' stroke='%23a67c00' stroke-width='6' stroke-linejoin='round' /><path d='M 25,35 Q 50,50 75,35 M 15,50 Q 50,65 85,50 M 25,65 Q 50,80 75,65' fill='none' stroke='%23a67c00' stroke-width='6' stroke-linecap='round'/></svg>");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        
        .card-title { text-align: center; font-weight: bold; margin-top: 25px; border-bottom: 2px solid #ccc; padding-bottom: 5px; }
        .card-img { flex-grow: 1; display: flex; justify-content: center; align-items: center; font-size: 3.5em; }
        .card-desc { font-size: 0.9em; text-align: center; background: rgba(0,0,0,0.1); padding: 5px; border-radius: 5px; }
        .piles { display: flex; justify-content: space-between; width: 800px; margin-top: 10px; font-size: 1em; color: #ccc; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Usiec Cepra (ang. Slay the Ceper)</h1>

    <div class="battlefield">
        <div class="entity" id="player">
            <h2>Jędrek 🧔‍♂️</h2>
            <div class="sprite" id="sprite-player">
                <svg viewBox="0 0 100 100" width="120" height="120">
                    <line x1="50" y1="65" x2="30" y2="75" stroke="#ffccaa" stroke-width="6" stroke-linecap="round"/>
                    <line x1="45" y1="85" x2="40" y2="100" stroke="white" stroke-width="8"/>
                    <line x1="55" y1="85" x2="60" y2="100" stroke="white" stroke-width="8"/>
                    <ellipse cx="38" cy="100" rx="8" ry="4" fill="#8b5a2b"/>
                    <ellipse cx="62" cy="100" rx="8" ry="4" fill="#8b5a2b"/>
                    <rect x="35" y="50" width="30" height="35" rx="5" fill="white" stroke="#222" stroke-width="3"/>
                    <path d="M 35,50 L 50,70 L 65,50" fill="none" stroke="#c00" stroke-width="3"/> <circle cx="50" cy="35" r="15" fill="#ffccaa"/>
                    <circle cx="45" cy="32" r="2" fill="black"/>
                    <circle cx="55" cy="32" r="2" fill="black"/>
                    <path d="M 40,40 Q 50,45 60,40" fill="none" stroke="#553311" stroke-width="3"/> <path d="M 20,25 Q 50,15 80,25" fill="none" stroke="#111" stroke-width="6"/>
                    <path d="M 35,25 C 35,5 65,5 65,25 Z" fill="#111"/>
                    <path d="M 60,15 Q 75,-5 85,10" fill="none" stroke="#d00" stroke-width="4"/> <line x1="50" y1="65" x2="70" y2="55" stroke="#ffccaa" stroke-width="6" stroke-linecap="round"/>
                    <line x1="65" y1="85" x2="85" y2="25" stroke="#654321" stroke-width="4"/> <polygon points="80,25 95,20 90,35" fill="#aaa" stroke="#333" stroke-width="2"/> </svg>
            </div>
            <div class="stats">❤️ Krzepa: <span id="p-hp">50</span>/50</div>
            <div class="stats" style="color: #4da6ff;">🛡️ Garda: <span id="p-block">0</span></div>
        </div>
        <div class="entity" id="enemy">
            <h2>Cepr 🧦</h2>
            <div class="intent" id="e-intent">Robi zdjęcie (⚔️ 8)</div>
            <div class="sprite" id="sprite-enemy">
                <svg viewBox="0 0 100 100" width="120" height="120">
                    <line x1="50" y1="65" x2="35" y2="75" stroke="#ffccaa" stroke-width="6" stroke-linecap="round"/>
                    <line x1="45" y1="80" x2="40" y2="95" stroke="#ffccaa" stroke-width="6"/>
                    <line x1="55" y1="80" x2="60" y2="95" stroke="#ffccaa" stroke-width="6"/>
                    <rect x="36" y="90" width="8" height="5" fill="white"/>
                    <rect x="56" y="90" width="8" height="5" fill="white"/>
                    <line x1="34" y1="95" x2="44" y2="95" stroke="#444" stroke-width="3"/>
                    <line x1="54" y1="95" x2="64" y2="95" stroke="#444" stroke-width="3"/>
                    <rect x="38" y="70" width="24" height="15" fill="#0066cc"/>
                    <rect x="38" y="45" width="24" height="25" rx="4" fill="#ff66b2"/>
                    <circle cx="50" cy="32" r="14" fill="#ffccaa"/>
                    <rect x="40" y="28" width="8" height="6" fill="#111" rx="2"/>
                    <rect x="52" y="28" width="8" height="6" fill="#111" rx="2"/>
                    <line x1="48" y1="31" x2="52" y2="31" stroke="#111" stroke-width="2"/>
                    <path d="M 45,40 Q 50,43 55,40" fill="none" stroke="#222" stroke-width="2"/> <polygon points="35,25 42,15 58,15 65,25" fill="#dddd88"/>
                    <line x1="50" y1="65" x2="65" y2="60" stroke="#ffccaa" stroke-width="6" stroke-linecap="round"/>
                    <rect x="58" y="54" width="16" height="12" fill="#333" rx="2"/>
                    <circle cx="66" cy="60" r="4" fill="#888"/> <path d="M 45,35 Q 50,60 60,54" fill="none" stroke="#222" stroke-width="1.5"/> </svg>
            </div>
            <div class="stats">❤️ Krzepa: <span id="e-hp">40</span>/40</div>
            <div class="stats" style="color: #4da6ff;">🛡️ Garda: <span id="e-block">0</span></div>
        </div>
    </div>

    <div class="ui-bar">
        <div class="energy">
            <svg class="icon-oscypek" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <polygon points="50,5 90,50 50,95 10,50" fill="#fbb03b" stroke="#a67c00" stroke-width="6" stroke-linejoin="round" />
                <path d="M 25,35 Q 50,50 75,35 M 15,50 Q 50,65 85,50 M 25,65 Q 50,80 75,65" fill="none" stroke="#a67c00" stroke-width="6" stroke-linecap="round"/>
            </svg>
            Oscypki: <span id="energy">3</span>/3
        </div>
        <button class="btn" id="end-turn-btn" onclick="endTurn()">Koniec Tury</button>
    </div>

    <div class="hand" id="hand"></div>
    
    <div class="piles">
        <div>Talia: <span id="draw-pile-count">0</span></div>
        <div>Odrzucone: <span id="discard-pile-count">0</span></div>
    </div>

    <script>
        const cardLibrary = {
            ciupaga: { id: 'ciupaga', name: 'Cios Ciupagą', cost: 1, type: 'attack', val: 6, emoji: '🪓', desc: 'Zadaje 6 obrażeń.' },
            gasior: { id: 'gasior', name: 'Łyk z Gąsiora', cost: 1, type: 'skill', val: 5, emoji: '🏺', desc: 'Zyskujesz 5 Gardy.' },
            kierpce: { id: 'kierpce', name: 'Rzut Kierpcem', cost: 2, type: 'attack', val: 12, emoji: '👞', desc: 'Zadaje 12 obrażeń. Śmierdzi.' },
            hej: { id: 'hej', name: 'Góralskie Hej!', cost: 0, type: 'skill', val: 0, emoji: '🗣️', desc: 'Dobierz 2 karty. Hej!' }
        };

        const state = {
            player: { hp: 50, maxHp: 50, block: 0, energy: 3, maxEnergy: 3 },
            enemy: { hp: 40, maxHp: 40, block: 0, nextAttack: 8 },
            deck: [], hand: [], discard: [], isAnimating: false
        };

        const startingDeck = ['ciupaga', 'ciupaga', 'ciupaga', 'ciupaga', 'gasior', 'gasior', 'gasior', 'gasior', 'kierpce', 'hej'];

        function initGame() {
            state.deck = [...startingDeck];
            shuffle(state.deck);
            startTurn();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function triggerAnim(elementId, animClass, duration = 400) {
            const el = document.getElementById(elementId);
            el.classList.remove(animClass);
            void el.offsetWidth; 
            el.classList.add(animClass);
            setTimeout(() => el.classList.remove(animClass), duration);
        }

        function drawCards(amount) {
            for (let i = 0; i < amount; i++) {
                if (state.deck.length === 0) {
                    if (state.discard.length === 0) break;
                    state.deck = [...state.discard];
                    state.discard = [];
                    shuffle(state.deck);
                }
                state.hand.push(state.deck.pop());
            }
            updateUI();
        }

        function startTurn() {
            state.player.energy = state.player.maxEnergy;
            state.player.block = 0;
            document.getElementById('end-turn-btn').disabled = false;
            drawCards(5);
        }

        function playCard(handIndex) {
            if (state.isAnimating) return;
            
            const cardId = state.hand[handIndex];
            const card = cardLibrary[cardId];
            if (state.player.energy < card.cost) return;

            state.player.energy -= card.cost;
            state.discard.push(state.hand.splice(handIndex, 1)[0]);
            updateUI();

            if (card.type === 'attack') {
                state.isAnimating = true;
                triggerAnim('sprite-player', 'anim-attack-p', 300);
                
                setTimeout(() => {
                    let dmg = card.val;
                    if (state.enemy.block >= dmg) {
                        state.enemy.block -= dmg;
                        triggerAnim('sprite-enemy', 'anim-block');
                    } else {
                        dmg -= state.enemy.block;
                        state.enemy.block = 0;
                        state.enemy.hp -= dmg;
                        triggerAnim('sprite-enemy', 'anim-damage');
                    }
                    updateUI();
                    checkWinCondition();
                    state.isAnimating = false;
                }, 150);
                
            } else if (card.type === 'skill') {
                if (cardId === 'gasior') {
                    state.player.block += card.val;
                    triggerAnim('sprite-player', 'anim-block');
                }
                if (cardId === 'hej') {
                    drawCards(2);
                    triggerAnim('sprite-player', 'anim-block');
                }
                updateUI();
            }
        }

        function endTurn() {
            if (state.isAnimating) return;
            state.isAnimating = true;
            document.getElementById('end-turn-btn').disabled = true;

            state.discard.push(...state.hand);
            state.hand = [];
            updateUI();

            setTimeout(() => {
                triggerAnim('sprite-enemy', 'anim-attack-e', 300);
                
                setTimeout(() => {
                    let dmg = state.enemy.nextAttack;
                    if (state.player.block >= dmg) {
                        state.player.block -= dmg;
                        triggerAnim('sprite-player', 'anim-block');
                    } else {
                        dmg -= state.player.block;
                        state.player.block = 0;
                        state.player.hp -= dmg;
                        triggerAnim('sprite-player', 'anim-damage');
                    }

                    state.enemy.block = 0;
                    state.enemy.nextAttack = Math.floor(Math.random() * 6) + 5;
                    updateUI();

                    setTimeout(() => {
                        state.isAnimating = false;
                        checkWinCondition();
                        if(state.player.hp > 0 && state.enemy.hp > 0) startTurn();
                    }, 500);
                }, 150);
            }, 300);
        }

        function checkWinCondition() {
            if (state.enemy.hp <= 0) {
                state.enemy.hp = 0;
                updateUI();
                setTimeout(() => alert("Wygrana! Ceper pogubił sandały w panice!"), 100);
                state.isAnimating = true;
            } else if (state.player.hp <= 0) {
                state.player.hp = 0;
                updateUI();
                setTimeout(() => alert("Koniec gry! Tłum turystów poprosił Cię o zrobienie im grupowego zdjęcia."), 100);
                state.isAnimating = true;
            }
        }

        function updateUI() {
            document.getElementById('p-hp').innerText = state.player.hp;
            document.getElementById('p-block').innerText = state.player.block;
            document.getElementById('e-hp').innerText = state.enemy.hp;
            document.getElementById('e-block').innerText = state.enemy.block;
            document.getElementById('energy').innerText = state.player.energy;
            document.getElementById('e-intent').innerText = `Zamiar: Atak (⚔️ ${state.enemy.nextAttack})`;

            document.getElementById('draw-pile-count').innerText = state.deck.length;
            document.getElementById('discard-pile-count').innerText = state.discard.length;

            const handDiv = document.getElementById('hand');
            handDiv.innerHTML = '';
            
            state.hand.forEach((cardId, index) => {
                const card = cardLibrary[cardId];
                const canPlay = state.player.energy >= card.cost;
                
                const cardEl = document.createElement('div');
                cardEl.className = `card ${canPlay ? '' : 'disabled'}`;
                cardEl.onclick = () => { if(canPlay && state.player.hp > 0 && state.enemy.hp > 0) playCard(index); };
                
                cardEl.innerHTML = `
                    <div class="card-cost">${card.cost}</div>
                    <div class="card-title">${card.name}</div>
                    <div class="card-img">${card.emoji}</div>
                    <div class="card-desc">${card.desc}</div>
                `;
                handDiv.appendChild(cardEl);
            });
        }

        initGame();
    </script>
</body>
</html>

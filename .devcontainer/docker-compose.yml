version: '3.8'

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: usiec-ceper-dev:latest
    user: developer
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - '5173:5173'
      - '9222:9222'
    command: sleep infinity
    shm_size: 2gb
